version: '3.8'

services:
  app:
    build: .
    container_name: biblioteca-api
    environment:
      NODE_ENV: development
      DB_PATH: /app/data/biblioteca.db
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_EXPIRY: 24h
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - biblioteca_data:/app/data
    command: npm run dev

volumes:
  biblioteca_data:
